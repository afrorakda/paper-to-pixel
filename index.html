    <style>
        :root {
            --main: #333;

            --accent: #eee;
            --border: #ccc;
            --input-bg: #fafafa;
            --radius: 15px;
            --text-gray: #666;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; }
        .subtitle { font-size: 1rem; color: var(--text-gray); font-weight: 600; margin-bottom: 30px; }

        /* DPI Section */
        .config-box {
            background: var(--input-bg);
            padding: 20px;
            border-radius: var(--radius);
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }
        .config-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .label { font-size: 0.85rem; font-weight: 800; color: var(--text-gray); text-transform: uppercase; }
