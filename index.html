<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paper to Pixel - Fridge Combo</title>
    
    <link rel="icon" href="image_90.png">
    <link rel="apple-touch-icon" href="image_90.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --border: #ccc;
            --input-bg: #fafafa;
            --radius: 15px;
            --text-gray: #666;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; }
        .subtitle { font-size: 0.95rem; color: var(--text-gray); font-weight: 600; margin-bottom: 30px; }

        /* Config Card */
        .card {
            background: var(--input-bg);
            padding: 18px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        
        .row-between { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .label { font-size: 0.8rem; font-weight: 800; color: var(--text-gray); text-transform: uppercase; letter-spacing: 0.5px; }

        /* Unit & Bleed Toggles */
        .toggle-group { display: flex; background: #ddd; padding: 3px; border-radius: 10px; gap: 2px; }
        .tgl-btn {
            border: none; background: none; padding: 4px 10px; font-size: 0.75rem; 
            font-weight: 800; cursor: pointer; border-radius: 8px; color: var(--text-gray);
        }
        .tgl-btn.active { background: var(--main); color: #fff; }

        .dpi-field {
            width: 70px; padding: 8px; border-radius: 10px; border: 2px solid var(--border);
            font-size: 1.1rem; font-weight: 800; text-align: center; outline: none;
            -webkit-appearance: none; -webkit-text-fill-color: var(--main); opacity: 1 !important;
        }

        /* Input Section */
        .input-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .input-group { flex: 1; position: relative; }
        
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 18px 12px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: #fff;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--main) !important;
            box-sizing: border-box;
            outline: none;
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main) !important;
            opacity: 1 !important;
        }
        input::placeholder { color: #ccc; -webkit-text-fill-color: #ccc; }

        .clr-x {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: var(--border); color: #fff; width: 18px; height: 18px;
            border-radius: 50%; border: none; font-size: 12px; font-weight: 800;
            cursor: pointer; display: none; line-height: 1;
        }
        .clr-x.active { display: block; }

        /* Presets */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 25px; }
        .p-btn {
            background: var(--accent); border: none; padding: 12px 5px; border-radius: 12px;
            font-size: 0.85rem; font-weight: 800; color: var(--main); cursor: pointer;
        }
        .p-btn:active { transform: scale(0.95); background: var(--border); }

        /* Result Area */
        .result-box {
            background: var(--main); color: #fff; padding: 25px 15px;
            border-radius: var(--radius); margin-top: 10px; cursor: pointer;
        }
        .result-box:active { transform: scale(0.98); }
        .res-label { font-size: 0.75rem; font-weight: 700; opacity: 0.5; margin-bottom: 8px; display: block; }
        .res-val { font-size: 1.8rem; font-weight: 800; }

        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--main); color: #fff; padding: 10px 20px;
            border-radius: 20px; font-size: 0.85rem; font-weight: 700;
            opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1000;
        }

        footer { margin-top: 50px; font-size: 11px; color: #777; line-height: 1.8; font-weight: 500; }
        footer a { color: inherit; text-decoration: underline; }
        .footer-btns { margin-top: 25px; }
        .kofi-btn {
            display: inline-block; background: var(--main); color: #fff;
            padding: 12px 24px; border-radius: var(--radius);
            text-decoration: none; font-weight: bold; font-size: 14px; margin-bottom: 15px;
        }
        .home-btn {
            display: block; width: 65%; margin: 0 auto; background: var(--accent);
            color: var(--main); border: none; padding: 10px;
            border-radius: var(--radius); font-weight: 800; font-size: 13px; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="toast">Copied!</div>

<div class="container">
    <h1>Paper to Pixel</h1>
    <p class="subtitle">Resolution calculator for creators.</p>

    <div class="card">
        <div class="row-between">
            <span class="label">Unit</span>
            <div class="toggle-group">
                <button class="tgl-btn active" id="btn-mm" onclick="setUnit('mm')">mm</button>
                <button class="tgl-btn" id="btn-in" onclick="setUnit('in')">inch</button>
            </div>
        </div>
        <div class="row-between">
            <span class="label">Bleed (+3mm)</span>
            <div class="toggle-group">
                <button class="tgl-btn active" id="btn-b0" onclick="setBleed(false)">OFF</button>
                <button class="tgl-btn" id="btn-b1" onclick="setBleed(true)">ON</button>
            </div>
        </div>
        <div class="row-between" style="margin-bottom: 0;">
            <span class="label">Resolution</span>
            <div>
                <input type="number" id="dpi" value="350" class="dpi-field" oninput="calc()">
                <span style="font-size: 0.8rem; font-weight: 800; margin-left: 4px;">DPI</span>
            </div>
        </div>
    </div>

    <div class="input-row">
        <div class="input-group">
            <input type="text" id="wIn" placeholder="Width" inputmode="decimal" oninput="upd()">
            <button class="clr-x" id="clr-w" onclick="cls('wIn')">×</button>
        </div>
        <div class="input-group">
            <input type="text" id="hIn" placeholder="Height" inputmode="decimal" oninput="upd()">
            <button class="clr-x" id="clr-h" onclick="cls('hIn')">×</button>
        </div>
    </div>

    <div class="grid">
        <button class="p-btn" onclick="setP(210, 297, 8.27, 11.69)">A4</button>
        <button class="p-btn" onclick="setP(148, 210, 5.83, 8.27)">A5</button>
        <button class="p-btn" onclick="setP(182, 257, 7.17, 10.12)">B5</button>
        <button class="p-btn" onclick="setP(128, 182, 5.04, 7.17)">B6</button>
        <button class="p-btn" onclick="setP(100, 148, 3.94, 5.83)">Post</button>
        <button class="p-btn" onclick="setP(91, 55, 3.58, 2.17)">Card</button>
    </div>

    <div class="result-box" onclick="cp()">
        <span class="res-label">Required Pixels (Tap to copy)</span>
        <div class="res-val" id="res">0 × 0 px</div>
    </div>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️buy me a coffee</a>
        <button class="home-btn" onclick="alert('Add to Home Screen via browser menu')">Add to Home Screen</button>
    </div>

    <footer>
        <div>No login / No tracking / No ads / Browser only</div>
        <div><a href="https://afrorakda.com/privacy/">Privacy Policy</a> / afrorakda © 2026</div>
    </footer>
</div>

<script>
    let unit = 'mm';
    let bleed = false;
    const wEl = document.getElementById('wIn');
    const hEl = document.getElementById('hIn');
    const dEl = document.getElementById('dpi');
    const rEl = document.getElementById('res');

    function setUnit(u) {
        unit = u;
        document.getElementById('btn-mm').classList.toggle('active', u==='mm');
        document.getElementById('btn-in').classList.toggle('active', u==='in');
        calc();
    }

    function setBleed(b) {
        bleed = b;
        document.getElementById('btn-b0').classList.toggle('active', !b);
        document.getElementById('btn-b1').classList.toggle('active', b);
        calc();
    }

    function upd() {
        wEl.value = wEl.value.replace(/[^0-9.]/g, '');
        hEl.value = hEl.value.replace(/[^0-9.]/g, '');
        document.getElementById('clr-w').classList.toggle('active', wEl.value !== '');
        document.getElementById('clr-h').classList.toggle('active', hEl.value !== '');
        calc();
    }

    function cls(id) { document.getElementById(id).value = ''; upd(); }

    function setP(wm, hm, wi, hi) {
        wEl.value = (unit === 'mm') ? wm : wi;
        hEl.value = (unit === 'mm') ? hm : hi;
        upd();
    }

    function calc() {
        let w = parseFloat(wEl.value) || 0;
        let h = parseFloat(hEl.value) || 0;
        const d = parseFloat(dEl.value) || 0;

        if (w > 0 && h > 0 && d > 0) {
            if (bleed) {
                // Bleed +3mm on each side = +6mm total or +0.25 inch
                w += (unit === 'mm') ? 6 : 0.25;
                h += (unit === 'mm') ? 6 : 0.25;
            }
            const pw = (unit === 'mm') ? Math.round((w * d) / 25.4) : Math.round(w * d);
            const ph = (unit === 'mm') ? Math.round((h * d) / 25.4) : Math.round(h * d);
            rEl.innerText = pw + ' × ' + ph + ' px';
        } else {
            rEl.innerText = '0 × 0 px';
        }
    }

    function cp() {
        if (rEl.innerText === '0 × 0 px') return;
        navigator.clipboard.writeText(rEl.innerText.replace(' px', ''));
        const t = document.getElementById('toast');
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 1500);
    }
</script>

</body>
</html>
