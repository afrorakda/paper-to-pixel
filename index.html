<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SVG Trimmer</title>
    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --radius: 15px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 { font-size: 1.6rem; font-weight: 900; margin-bottom: 5px; letter-spacing: -1px; }
        .sub { font-size: 0.8rem; color: #888; margin-bottom: 30px; font-weight: 600; }

        .label { text-align: left; font-size: 0.7rem; font-weight: 800; color: #aaa; margin-bottom: 5px; padding-left: 5px; }

        /* 入力エリア */
        textarea {
            width: 100%; height: 140px;
            padding: 15px; margin-bottom: 20px;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            background: #fafafa;
            font-size: 16px; /* ズーム防止 */
            font-family: ui-monospace, monospace;
            outline: none;
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main);
            opacity: 1 !important;
        }

        /* 結果表示エリア（読み取り専用） */
        .result-area {
            background: #f0f0f0;
            padding: 15px;
            border-radius: var(--radius);
            font-weight: 800;
            margin-bottom: 20px;
            border: 2px dashed #ccc;
        }

        #statLabel { font-size: 0.9rem; margin-bottom: 10px; display: block; }

        #svgOutput {
            width: 100%; height: 100px;
            background: transparent; border: none;
            font-size: 14px; font-family: monospace;
            color: var(--main); resize: none; outline: none;
            -webkit-text-fill-color: var(--main);
        }

        /* ダミーボタン（Add to Home 用） */
        .btn-sub {
            display: block; width: 100%; padding: 18px;
            background: #eee; color: var(--main);
            text-decoration: none; border-radius: var(--radius);
            font-weight: 800; font-size: 0.9rem;
            margin-top: 20px;
        }

        footer { margin-top: 50px; font-size: 10px; color: #bbb; font-weight: 600; line-height: 1.8; }

        /* モーダル */
        #modal {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #fff; padding: 30px; border-radius: var(--radius);
            width: 85%; max-width: 320px; text-align: left;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SVG Trimmer</h1>
    <p class="sub">Paste to shave instantly.</p>
    
    <div class="label">INPUT (PASTE HERE)</div>
    <textarea id="svgInput" placeholder="Paste original SVG code..." oninput="autoShave()"></textarea>

    <div class="label">RESULT (TAP TO SELECT ALL)</div>
    <div class="result-area">
        <span id="statLabel">Reduced: --- %</span>
        <textarea id="svgOutput" readonly onclick="this.select();" placeholder="Result will appear here..."></textarea>
    </div>

    <a href="javascript:void(0)" class="btn-sub" onclick="document.getElementById('modal').style.display='flex'">📱 Add to Home Screen</a>
    
    <footer>
        No login / No tracking / No ads / Browser only<br>
        afrorakda &copy; 2026
    </footer>
</div>

<div id="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="margin-top:0">📱 Install</h3>
        <p style="font-size:0.8rem">🍏 <strong>iPhone:</strong> Tap Share, then Add to Home Screen.</p>
        <a href="javascript:void(0)" class="btn-sub" style="padding:12px; margin-top:10px;" onclick="document.getElementById('modal').style.display='none'">Close</a>
    </div>
</div>

<script>
    function autoShave() {
        var input = document.getElementById('svgInput');
        var output = document.getElementById('svgOutput');
        var label = document.getElementById('statLabel');
        var raw = input.value.trim();

        if(!raw) {
            output.value = "";
            label.innerText = "Reduced: --- %";
            return;
        }

        try {
            var c = raw;
            // Safariが嫌がらない程度の段階的クリーニング
            c = c.replace(/<\?xml.*?\?>/gi, '');
            c = c.replace(/<!DOCTYPE.*?>/gi, '');
            c = c.replace(//g, '');
            c = c.replace(/<metadata>[\s\S]*?<\/metadata>/gi, '');
            c = c.replace(/<desc>[\s\S]*?<\/desc>/gi, '');
            
            // 属性削除
            var attrs = ['id', 'class', 'version', 'xmlns:xlink', 'xml:space', 'enable-background', 'sodipodi:docname', 'inkscape:version', 'x', 'y', 'style'];
            for(var i=0; i<attrs.length; i++) {
                var re = new RegExp('\\s' + attrs[i] + '=".*?"', 'gi');
                c = c.replace(re, ' ');
            }

            // 小数点丸め（3桁以上を2桁へ）
            c = c.replace(/(\d+\.\d{3,})/g, function(m) {
                return parseFloat(m).toFixed(2);
            });

            // 詰め
            c = c.replace(/>\s+</g, '><');
            c = c.trim();

            // 反映
            output.value = c;

            // 削減率計算
            var pct = Math.round(((raw.length - c.length) / raw.length) * 100);
            label.innerText = "Reduced: " + (pct > 0 ? pct : 0) + "%";

        } catch(e) {
            output.value = "Error: " + e.message;
        }
    }
</script>

</body>
</html>
