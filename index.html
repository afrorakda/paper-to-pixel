<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SVG Trimmer</title>
    <style>
        :root { --main: #333; --bg: #fff; --radius: 15px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        textarea {
            width: 100%; height: 160px; padding: 15px; margin-bottom: 20px;
            border: 2px solid #eee; border-radius: var(--radius);
            background: #fafafa; font-size: 16px; outline: none;
        }
        .stat { background: #f0f0f0; padding: 15px; border-radius: var(--radius); font-weight: 800; margin-bottom: 20px; }
        .btn {
            display: block; width: 100%; padding: 20px; background: var(--main); color: #fff;
            text-decoration: none; border-radius: var(--radius); font-weight: 800; margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SVG Trimmer</h1>
    <textarea id="svgInput" placeholder="Paste SVG here..."></textarea>
    <div class="stat" id="statLabel">Reduced: --- %</div>
    
    <a href="javascript:void(0)" class="btn" onclick="goShave()">SHAVE & COPY</a>
    
    <a href="javascript:void(0)" class="btn" style="background:#eee; color:#333;" onclick="alert('Working')">TEST BUTTON</a>
</div>

<script>
    function goShave() {
        var input = document.getElementById('svgInput');
        var label = document.getElementById('statLabel');
        var str = input.value.trim();
        
        if(!str) { alert('Paste SVG'); return; }

        try {
            // 正規表現を使わず、改行とスペースを1つずつ消す超・原始的ループ
            var clean = "";
            var lastChar = "";
            for (var i = 0; i < str.length; i++) {
                var c = str[i];
                // 改行やタブをスペース1つに置き換えるだけの超安全処理
                if (c === '\n' || c === '\r' || c === '\t') {
                    c = ' ';
                }
                // 連続するスペースを省く
                if (!(c === ' ' && lastChar === ' ')) {
                    clean += c;
                }
                lastChar = c;
            }

            // 削減率の表示
            var pct = Math.round(((str.length - clean.length) / str.length) * 100);
            label.innerText = "Reduced: " + pct + "%";

            // コピー
            var t = document.createElement('textarea');
            t.value = clean;
            document.body.appendChild(t);
            t.select();
            document.execCommand('copy');
            document.body.removeChild(t);

            alert('DONE: ' + pct + '%');
        } catch (e) {
            alert('Error: ' + e.message);
        }
    }
</script>

</body>
</html>
